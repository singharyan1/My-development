<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sonepur</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">SONEPUR</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="business.html">Business</a></li>
                <li><a href="opportunities.html">Opportunities</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="updates.html" class="btn-primary">Latest Updates</a></li>
            </ul>
        </nav>
        <div class="hamburger"><span></span><span></span><span></span></div>
    </header>

    <section class="page-header">
        <h1 class="section-title">Contact Us</h1>
        <p>Get in touch for inquiries, business proposals, and more information.</p>
    </section>

    <section class="page-content">
        <div class="content-box" style="text-align: left;">
            <h2 style="margin-bottom: 1rem; color: var(--primary);">Reach Out</h2>
            <form id="contact-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" placeholder="Your Name" required style="padding: 0.8rem; border: 1px solid var(--glass-border); border-radius: 4px;">
                <input type="email" placeholder="Email Address" required style="padding: 0.8rem; border: 1px solid var(--glass-border); border-radius: 4px;">
                <textarea placeholder="Your Message..." rows="5" required style="padding: 0.8rem; border: 1px solid var(--glass-border); border-radius: 4px; resize: vertical;"></textarea>
                <button type="submit" class="btn-primary" style="border: none; cursor: pointer; align-self: flex-start;">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand"><h2>SONEPUR</h2></div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
